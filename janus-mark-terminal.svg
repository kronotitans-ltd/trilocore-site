<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Janus AI">
  <defs>
    <linearGradient id="janust-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- medallion / coin (terminal ink) -->
  <circle cx="32" cy="32" r="27" fill="#0b0e14" stroke="url(#janust-edge)" stroke-width="2.6"/>
  <!-- central axis where the two faces meet -->
  <line x1="32" y1="9" x2="32" y2="55" stroke="#22d3ee" stroke-width="1.2" opacity="0.35"/>
  <!-- left face: the DEFENDER (cyan), profile looking outward to the left -->
  <path d="M32,13 L25,14 Q19,15 17.5,21 L16,24 L12,28 L16,30 L15,33 L17,34 L16,37 L20,42 L26,44 L32,44 Z"
        fill="#22d3ee"/>
  <circle cx="21" cy="24" r="1.9" fill="#0b0e14"/>
  <!-- right face: the ATTACKER (green), mirror of the left -->
  <g transform="translate(64,0) scale(-1,1)">
    <path d="M32,13 L25,14 Q19,15 17.5,21 L16,24 L12,28 L16,30 L15,33 L17,34 L16,37 L20,42 L26,44 L32,44 Z"
          fill="#34d399"/>
    <circle cx="21" cy="24" r="1.9" fill="#0b0e14"/>
  </g>
</svg>
