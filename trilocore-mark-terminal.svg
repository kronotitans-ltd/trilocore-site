<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Trilocore">
  <defs>
    <linearGradient id="tct-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="tct-core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#34d399"/>
    </radialGradient>
  </defs>
  <!-- outer hexagon (layer 1) -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
           fill="none" stroke="url(#tct-edge)" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- inner hexagon (layer 2) -->
  <polygon points="32,16 46,24 46,40 32,48 18,40 18,24"
           fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-width="1.7" stroke-linejoin="round"/>
  <!-- core (layer 3 — the "core" in trilo-core) -->
  <circle cx="32" cy="32" r="5.6" fill="url(#tct-core)"/>
  <circle cx="32" cy="32" r="9" fill="none" stroke="#34d399" stroke-opacity="0.30" stroke-width="1.4"/>
</svg>
