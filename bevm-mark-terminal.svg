<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="BEVM Scanner">
  <defs>
    <linearGradient id="bevmt-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- EVM block (hexagon, shares the Trilocore silhouette) -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
           fill="#0b0e14" stroke="url(#bevmt-edge)" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- bytecode lines being scanned -->
  <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round">
    <line x1="18" y1="22" x2="40" y2="22"/>
    <line x1="18" y1="30" x2="32" y2="30"/>
    <line x1="18" y1="38" x2="37" y2="38"/>
  </g>
  <!-- diagonal scan beam -->
  <line x1="14" y1="46" x2="46" y2="16" stroke="#67e8f9" stroke-width="1.4"
        stroke-dasharray="2 3" opacity="0.6"/>
  <!-- verified exploit target -->
  <circle cx="41" cy="43" r="7" fill="#0b0e14" stroke="#34d399" stroke-width="2.4"/>
  <path d="M37.6 43 l2.4 2.4 L45 40.5" fill="none" stroke="#34d399"
        stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
